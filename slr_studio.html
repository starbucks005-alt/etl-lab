<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLR Studio — Redirecting</title>
  <meta http-equiv="refresh" content="3;url=https://slrstudio.online/" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f5f3ee;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    .badge {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #c9a86a;
      text-transform: uppercase;
    }

    .logo {
      font-size: 13px;
      letter-spacing: 0.25em;
      color: #c9a86a;
      text-transform: uppercase;
      font-weight: 700;
    }

    .logo span {
      color: #f5f3ee;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #c9a86a;
      opacity: 0.4;
    }

    .heading {
      font-size: 22px;
      font-weight: 700;
      font-family: Georgia, 'Times New Roman', serif;
      color: #f5f3ee;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .sub {
      font-size: 12px;
      color: rgba(245,243,238,0.45);
      letter-spacing: 0.1em;
      text-align: center;
      max-width: 340px;
      line-height: 1.7;
    }

    /* Animated dot strip */
    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c9a86a;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1);   }
    }

    .cta {
      margin-top: 0.5rem;
      display: inline-block;
      padding: 10px 28px;
      border: 1px solid #c9a86a;
      color: #c9a86a;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }
    .cta:hover {
      background: #c9a86a;
      color: #0a0a0a;
    }

    .footer-note {
      position: fixed;
      bottom: 24px;
      font-size: 10px;
      color: rgba(245,243,238,0.2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .footer-note a {
      color: rgba(201,168,106,0.4);
      text-decoration: none;
    }
    .footer-note a:hover {
      color: #c9a86a;
    }
  </style>
</head>
<body>

  <div class="badge">ETL · Emerging Technologies Laboratory · Wright State University</div>

  <div>
    <div class="logo">SLR <span>Studio</span></div>
  </div>

  <div class="divider"></div>

  <p class="heading">Launching Research Engine</p>

  <p class="sub">
    SLR Studio has moved to its full platform at<br>
    <strong style="color:#c9a86a;">slrstudio.online</strong>.
    You will be redirected automatically.
  </p>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <a class="cta" href="https://slrstudio.online/">Go to SLR Studio &rarr;</a>

  <p class="footer-note">
    <a href="index.html">&larr; ETL Lab</a>
    &nbsp;&nbsp;·&nbsp;&nbsp;
    <a href="https://greylanderpress.com/" target="_blank">Greylander Press</a>
  </p>

  <script>
    // Fallback: redirect after 3 seconds in case meta-refresh is blocked
    setTimeout(function () {
      window.location.href = 'https://slrstudio.online/';
    }, 3000);
  </script>

</body>
</html>
